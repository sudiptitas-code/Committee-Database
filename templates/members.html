{% extends 'base.html' %}
{% block content %}

<h2 class="fw-bold mb-4 gradient-text">Member Analytics</h2>

<div class="card shadow-lg p-4">
    <table class="table table-hover">
        <thead class="table-dark">
            <tr>
                <th>Member Name</th>
                <th>Number of Committees</th>
            </tr>
        </thead>
        <tbody>
            {% for name, count in members.items() %}
            <tr>
                <td>{{ name }}</td>
                <td><span class="badge bg-primary">{{ count }}</span></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
