{% extends 'base.html' %}
{% block content %}

<h2 class="fw-bold mb-4 gradient-text">Dashboard Overview</h2>

<div class="row mb-4">

    <div class="col-md-6">
        <div class="card text-white bg-primary shadow-lg">
            <div class="card-body text-center">
                <h5>Total Committees</h5>
                <h2>{{ total_committees }}</h2>
            </div>
        </div>
    </div>

    <div class="col-md-6">
        <a href="/members" style="text-decoration:none;">
            <div class="card text-white bg-success shadow-lg clickable-card">
                <div class="card-body text-center">
                    <h5>Total Active Members</h5>
                    <h2>{{ total_members }}</h2>
                    <small>(Click to view details)</small>
                </div>
            </div>
        </a>
    </div>

</div>

<div class="card shadow-lg p-4">
    <h5 class="mb-3">📈 Committee Growth (Monthly)</h5>
    <canvas id="growthChart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const ctx = document.getElementById('growthChart');

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: {{ growth_labels|tojson }},
            datasets: [{
                label: 'Committees Created',
                data: {{ growth_values|tojson }},
                borderWidth: 3,
                fill: true,
                tension: 0.3
            }]
        }
    });
</script>

{% endblock %}
