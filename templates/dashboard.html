{% extends 'base.html' %}
{% block content %}

<h2 class="mb-4">Dashboard</h2>

<div class="row">
    <div class="col-md-6">
        <div class="card text-white bg-primary mb-3">
            <div class="card-body">
                <h5>Total Committees</h5>
                <h2>{{ total_committees }}</h2>
            </div>
        </div>
    </div>

    <div class="col-md-6">
        <div class="card text-white bg-success mb-3">
            <div class="card-body">
                <h5>Total Members</h5>
                <h2>{{ total_members }}</h2>
            </div>
        </div>
    </div>
</div>

<div class="alert alert-info text-center">
    {{ current_datetime }}
</div>

{% endblock %}
