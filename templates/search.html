{% extends "base.html" %}
{% block content %}

<h2>Search Committees</h2>

<form method="GET">
    <input class="form-control mb-3" name="q" placeholder="Search by subject or reference">
</form>

<table class="table table-bordered">
    <tr>
        <th>ID</th>
        <th>Subject</th>
        <th>Reference</th>
        <th>Date</th>
        <th>Actions</th>
    </tr>

    {% for row in rows %}
    <tr>
        <td>{{ row['id'] }}</td>
        <td>{{ row['subject'] }}</td>
        <td>{{ row['reference_no'] }}</td>
        <td>{{ row['date'] }}</td>
        <td>
            <a class="btn btn-warning btn-sm" href="/edit/{{ row['id'] }}">Edit</a>

            <form action="/delete/{{ row['id'] }}" method="POST" style="display:inline;">
                <button class="btn btn-danger btn-sm">Delete</button>
            </form>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
