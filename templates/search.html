{% extends "base.html" %}
{% block content %}

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>🔍 Search Committee</h3>
        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">⬅ Dashboard</a>
    </div>

    <div class="card shadow p-4">
        <div class="input-group">
            <input type="text" id="searchBox" class="form-control"
                   placeholder="Search by subject, reference no, convener...">
        </div>
    </div>

    <br>

    <div class="card shadow p-3">
        <div class="table-responsive">
            <table class="table table-bordered table-striped table-hover" id="results">
                <thead class="table-dark">
                    <tr>
                        <th>Reference No</th>
                        <th>Subject</th>
                        <th>Date</th>
                        <th>Convener</th>
                        <th>Members</th>
                        <th width="160">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="6" class="text-center">Start typing to search...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
{% endblock %}
