<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Committee Management</title>
    <style>
        /* --- General Styles --- */
        body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f5f5f5; }
        a { text-decoration:none; }

        /* --- Top Navigation Bar --- */
        .navbar { background-color:#4CAF50; color:white; padding:15px; display:flex; justify-content:space-between; align-items:center; }
        .navbar a { color:white; margin-left:15px; font-weight:bold; }
        .navbar a:hover { text-decoration:underline; }

        /* --- Flash Messages --- */
        .flash { max-width:600px; margin:15px auto; padding:10px 15px; border-radius:5px; color:white; font-weight:bold; text-align:center; }
        .flash-success { background-color:#4CAF50; }
        .flash-error { background-color:#f44336; }

        /* --- Responsive Container --- */
        .container { max-width:1200px; margin:20px auto; padding:10px; }

        /* --- Table Styling --- */
        table { width:100%; border-collapse:collapse; font-family:Arial, sans-serif; }
        th, td { padding:10px; border:1px solid #ddd; text-align:left; }
        thead { background-color:#4CAF50; color:white; }
        tbody tr:hover { background-color:#f1f1f1; }

        /* --- Buttons --- */
        .btn { padding:5px 12px; border-radius:4px; color:white; font-weight:bold; }
        .btn-edit { background-color:#2196F3; }
        .btn-delete { background-color:#f44336; }
        .btn:hover { opacity:0.85; }

        /* --- Responsive --- */
        @media(max-width:768px){
            table, thead, tbody, th, td, tr { display:block; }
            thead tr { display:none; }
            tr { margin-bottom:15px; border-bottom:2px solid #ddd; }
            td { border:none; position:relative; padding-left:50%; }
            td::before { 
                position:absolute; left:10px; width:45%; white-space:nowrap; font-weight:bold;
            }
            td:nth-of-type(1)::before { content:"Subject"; }
            td:nth-of-type(2)::before { content:"Ref No"; }
            td:nth-of-type(3)::before { content:"Date"; }
            td:nth-of-type(4)::before { content:"Convener"; }
            td:nth-of-type(5)::before { content:"Member1"; }
            td:nth-of-type(6)::before { content:"Member2"; }
            td:nth-of-type(7)::before { content:"Member3"; }
            td:nth-of-type(8)::before { content:"Secretary"; }
            td:nth-of-type(9)::before { content:"Actions"; }
        }
    </style>
</head>
<body>
    <!-- --- Navigation Bar --- -->
<div class="navbar">
    <div>Committee Management</div>
    <div>
        <a href="/">Dashboard</a>
        <a href="/add">Add Record</a>
        <a href="/search">Search</a>
    </div>
</div>

    <!-- --- Flash Messages --- -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="flash flash-success">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <!-- --- Main Content --- -->
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
