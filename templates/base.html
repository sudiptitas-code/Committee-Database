<!DOCTYPE html>
<html>
<head>
    <title>Committee Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">📋 Committee System</a>

        <div>
            <a class="btn btn-outline-light me-2" href="/add">➕ Add</a>
            <a class="btn btn-outline-light me-2" href="/search">🔍 Search</a>
            <a class="btn btn-outline-light me-2" href="/import">📥 Import</a>
            <a class="btn btn-success" href="/export">📤 Export</a>
        </div>
    </div>
</nav>

<div class="container mt-5">

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{category}} alert-dismissible fade show">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
