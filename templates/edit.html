{% extends "base.html" %}
{% block content %}
<div class="card p-4 shadow mx-auto" style="max-width:600px;">
    <h3 class="text-center mb-3">Edit Committee Record</h3>
    <form method="POST" action="{{ url_for('update', id=data['id']) }}">
        <div class="mb-2"><input type="text" name="subject" class="form-control" value="{{ data['subject'] }}" required></div>
        <div class="mb-2"><input type="text" name="reference_no" class="form-control" value="{{ data['reference_no'] }}" required></div>
        <div class="mb-2"><input type="date" name="date" class="form-control" value="{{ data['date'] }}" required></div>
        <div class="mb-2"><input type="text" name="convener" class="form-control" value="{{ data['convener'] }}" required></div>
        <div class="mb-2"><input type="text" name="member1" class="form-control" value="{{ data['member1'] }}"></div>
        <div class="mb-2"><input type="text" name="member2" class="form-control" value="{{ data['member2'] }}"></div>
        <div class="mb-2"><input type="text" name="member3" class="form-control" value="{{ data['member3'] }}"></div>
        <div class="mb-3"><input type="text" name="secretary" class="form-control" value="{{ data['secretary'] }}"></div>
        <button type="submit" class="btn btn-success w-100">Update Record</button>
    </form>
</div>
{% endblock %}
