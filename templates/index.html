{% extends "base.html" %}
{% block content %}
<div class="card p-4 shadow mx-auto" style="max-width:600px;">
    <h3 class="text-center mb-3">Add Committee Record</h3>
    <form method="POST" action="{{ url_for('add') }}">
        <div class="mb-2">
            <input type="text" name="subject" class="form-control" placeholder="Committee Subject" required>
        </div>
        <div class="mb-2">
            <input type="text" name="reference_no" class="form-control" placeholder="Reference No" required>
        </div>
        <div class="mb-2">
            <input type="date" name="date" class="form-control" required>
        </div>
        <div class="mb-2">
            <input type="text" name="convener" class="form-control" placeholder="Convener" required>
        </div>
        <div class="mb-2">
            <input type="text" name="member1" class="form-control" placeholder="Member 1">
        </div>
        <div class="mb-2">
            <input type="text" name="member2" class="form-control" placeholder="Member 2">
        </div>
        <div class="mb-2">
            <input type="text" name="member3" class="form-control" placeholder="Member 3">
        </div>
        <div class="mb-3">
            <input type="text" name="secretary" class="form-control" placeholder="Member Secretary">
        </div>
        <button type="submit" class="btn btn-success w-100">Add Record</button>
    </form>
</div>
{% endblock %}
